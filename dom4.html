// This example demonstrates how to use the getElementById method in JavaScript to select an HTML element by its ID and display its content in the console.
<!DOCTYPE html>
<html>
<head>
    <title> getElementById Example</title>
</head>
<body>

<h1 id="title"> Hello Students</h1>

<script>

// Select the heading element using its ID
let heading = document.getElementById("title");

// Display the element in the browser console
console.log(heading);

// Display only the text inside the heading
console.log(heading.innerText);

</script>
</body>
</html>
