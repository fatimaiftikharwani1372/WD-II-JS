<!DOCTYPE html>
<html>
<head>
    <title>Voting Eligibility</title>
</head>
<body>

    <h1>Check Voting Eligibility</h1>

    <button id="checkBtn">Check Eligibility</button>

    <p id="result"></p>

    <script>
        document.getElementById("checkBtn").onclick = function () {

            let age = prompt("Enter your age:");

            if (age >= 18) {
                document.getElementById("result").innerHTML = "You are eligible to vote";
            } else {
                document.getElementById("result").innerHTML = "You are not eligible to vote";
            }

        };
    </script>

</body>
</html>
