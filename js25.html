<!DOCTYPE html>
<html>
<head>
    <title>Question 25</title>
</head>
<body>

<script>
    let num1 = Number(prompt("Enter first number:"));
    let num2 = Number(prompt("Enter second number:"));

    let temp = num1;
    num1 = num2;
    num2 = temp;

    alert("After Swapping:");
    alert("First Number = " + num1);
    alert("Second Number = " + num2);
</script>

</body>
</html>
